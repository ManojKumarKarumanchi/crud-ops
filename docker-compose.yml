version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: crud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crud-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database connection
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/crud_db

      # JWT configuration
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-eccfa8aab8387b8c249acfbac68bdfd18b8f6ea1c6d7839b5ecaec15761c385c}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # Application settings
      APP_NAME: "CRUD API"
      APP_VERSION: "1.0.0"
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - crud-network

  # Admin utility container (optional - for DB management)
  # Uncomment to use: docker-compose run --rm db-admin
  # db-admin:
  #   image: dpage/pgadmin4:latest
  #   container_name: crud-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - db
  #   networks:
  #     - crud-network

volumes:
  postgres_data:
    driver: local

networks:
  crud-network:
    driver: bridge
